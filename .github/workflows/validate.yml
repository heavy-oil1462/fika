# The software gate. Cheap and broad (yaml, esphome config, contract
# couplings, python), so it runs on every change.
name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install gate toolchain
        run: pip install -r requirements.txt
      - name: validation gate
        run: python3 tools/validate.py
